<!DOCTYPE html>

  <head>

    <title>Randomframes — Product</title>
    <meta name="robots" content="index,follow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

  <body data-category="product" data-title="Product">
    <header class="site-header">
      <a class="brand" href="index.html#top">RANDOM FRAMES</a>
      <nav class="section-nav" aria-label="Primary navigation">

    <main id="top" class="genre-page-main">
      <section class="genre-page-head">
        <a class="back-link" href="index.html#top">&larr; Back to Portfolio</a>
        <h1 id="genreTitle">Product</h1>

      <section class="gallery-section revealed">
        <div id="genreGallery" class="gallery-grid" role="list" aria-label="Product gallery"></div>

    <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-modal="true">

        <img id="lightboxImage" src="" alt="" />

      </figure>
      <button class="lightbox-next" type="button" aria-label="Next image">&#10095;</button>

    <footer id="contact" class="site-footer">
      <div class="footer-divider" aria-hidden="true"></div>
      <p>Bangalore | Coorg</p>
      <p id="contact-phone"><a class="footer-phone" href="tel:9148083905">9148083905</a></p>
