name: Update Image Manifest

on:
  push:
    paths:
      - "images/**"
      - "scripts/generate-manifest.mjs"
      - ".github/workflows/update-image-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate manifest
        run: node scripts/generate-manifest.mjs

      - name: Commit manifest updates
        run: |
          if git diff --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/manifest.json
          git commit -m "chore: update images manifest"
          git push
